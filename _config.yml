---
title: Readingsnail's Attic
timezone: Asia/Seoul
collections:
  posts:
    title: Posts
    output: true
  uploads:
    title: Uploads
    output: true
defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: single
    author_profile: true
    read_time: true
    comments: true
    share: true
    related: true
- scope:
    path: _pages
    type: pages
  values:
    layout: single
    author_profile: true
locale: ko
email: twoflowers@readingsnail.pe.kr
description: 책달의 다락방
github_username: readingsnail
minimal_mistakes_skin: mint
search: true
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: "/:categories/:title/"
paginate: 4
paginate_path: "/page:num/"
include:
- _pages
plugins:
- jekyll-paginate
- jekyll-sitemap
- jekyll-gist
- jekyll-feed
- jemoji
- jekyll-include-cache
- jekyll-scholar
author:
  name: Woosuk Park
  avatar: "/assets/images/profile.png"
  bio: Maybe Twoflower
  location: Superposition Location
  links:
  - label: Website
    icon: fas fa-fw fa-link
    url: https://www.readingsnail.pe.kr
  - label: Twitter
    icon: fab fa-fw fa-twitter-square
    url: https://twitter.com/reading_snail
  - label: GitHub
    icon: fab fa-fw fa-github
    url: https://github.com/readingsnail
footer:
  links:
  - label: Twitter
    icon: fab fa-fw fa-twitter-square
    url: https://twitter.com/reading_snail
  - label: GitHub
    icon: fab fa-fw fa-github
    url: https://github.com/readingsnail
category_archive:
  type: liquid
  path: "/categories/"
tag_archive:
  type: liquid
  path: "/tags/"
